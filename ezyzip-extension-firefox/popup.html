<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ezyZip Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      width: 220px;
      padding: 12px 14px 14px;
      color: #222;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #111;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #888;
      margin: 10px 0 4px;
    }

    .section-label:first-of-type {
      margin-top: 0;
    }

    label {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 0;
      cursor: pointer;
    }

    input[type="radio"] {
      accent-color: #e05c00;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .lang-select {
      width: 100%;
      margin-top: 2px;
      padding: 4px 6px;
      font-size: 12px;
      font-family: inherit;
      color: #222;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      appearance: auto;
    }

    .lang-select:focus {
      outline: 2px solid #e05c00;
      outline-offset: 1px;
      border-color: #e05c00;
    }
  </style>
</head>
<body>
  <h1 data-i18n="openLinks">Open links with…</h1>

  <label>
    <input type="radio" name="domain" value="free" />
    <span><span data-i18n="free">Free</span> — www.ezyzip.com</span>
  </label>
  <label>
    <input type="radio" name="domain" value="pro" />
    <span><span data-i18n="pro">Pro</span> — ezyzip.pro</span>
  </label>

  <div class="section-label" data-i18n="language">Language</div>
  <select id="lang" class="lang-select">
    <option value="auto" data-i18n="autoDetect">Auto-detect (browser language)</option>
    <option value="en">English</option>
    <option value="de">Deutsch</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="id">Bahasa Indonesia</option>
    <option value="it">Italiano</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
    <option value="pl">Polski</option>
    <option value="pt">Português</option>
    <option value="ru">Русский</option>
    <option value="tr">Türkçe</option>
    <option value="vi">Tiếng Việt</option>
    <option value="zh-CN">简体中文</option>
    <option value="zh-TW">繁體中文</option>
  </select>

  <script src="popup.js"></script>
</body>
</html>
